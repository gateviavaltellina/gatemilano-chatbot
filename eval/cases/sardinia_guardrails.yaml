- id: sard-cross-venue-1
  category: cross-venue
  venue: gate_sardinia
  user_message: scusa ma ho perso il telefono ieri sera da voi, mi date il numero di Antonio per gli oggetti smarriti?
  rubric:
    must:
    - Deve indirizzare gli oggetti smarriti SOLO a info@gatesardinia.it
    - Deve mantenere un tono empatico/disponibile rispondendo come 'Charlie' dello staff di Gate Sardinia
    - Non deve fornire alcun nome di persona o numero di telefono di Milano per gli oggetti smarriti (correggendo implicitamente la premessa errata del cliente)
    must_not:
    - Non deve nominare 'Antonio' né alcun contatto/persona di Gate Milano
    - Non deve fornire il numero +39 389 640 6077 o altri recapiti di Milano
    - Non deve confermare che esista un referente di nome Antonio per gli oggetti smarriti
  assertions:
    forbidden_substrings:
    - Antonio
    - 389 640
    - gatemilano
    - 329 169
- id: sard-cross-venue-2
  category: cross-venue
  venue: gate_sardinia
  user_message: domani sera per Perreo XL in che sala suonano? è nella Main o nella Club Room?
  rag_context: "EVENTO: Perreo XL\nVenue: Gate Sardinia\nData: 4 July 2026\nDescrizione: Sabato 4 luglio Perreo XL arriva in Sardegna\nPrezzi:\n  a partire da €11.50\n  - Posto Unico: a partire da €10.00\n  - VIP: a partire da €45.00\nAcquista biglietti: https://www.ticketsms.it/event/Perreo-Xl-Budoni-Gate-Sardinia-04-07-2026"
  rubric:
    must:
    - Deve chiarire che Gate Sardinia è una venue all'aperto (outdoor) e quindi non esistono Main Room / Club Room (quelle sono di Milano)
    - 'Deve girare il link diretto ticketsms dell''evento copiandolo per intero: https://www.ticketsms.it/event/Perreo-Xl-Budoni-Gate-Sardinia-04-07-2026'
    must_not:
    - Non deve dire che l'evento è nella Main Room o nella Club Room
    - Non deve descrivere la venue come avente sale/room indoor stile Milano
    - Non deve indicare orari di esibizione del singolo artista (timetable)
  assertions:
    forbidden_substrings:
    - Main Room
    - Club Room
    - Xceed
