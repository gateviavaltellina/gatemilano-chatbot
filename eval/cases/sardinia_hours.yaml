- id: sard-hours-season-1
  category: hours-season
  venue: gate_sardinia
  user_message: ciao a che ora chiudete?
  rubric:
    must:
    - Indica che la chiusura è alle 04:00 (le quattro del mattino)
    - Può aggiungere che l'apertura è alle 22:00, indicando l'orario di tutte le sere come 22:00–04:00
