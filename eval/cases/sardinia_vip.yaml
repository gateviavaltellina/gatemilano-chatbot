- id: sard-extra-tables-age-1
  category: vip-tables
  venue: gate_sardinia
  user_message: se prendiamo un tavolo mia sorella che ha 17 anni puo stare al tavolo con noi?
  rubric:
    must:
    - Deve indicare che l'eta minima al tavolo e 18 anni (come per l'ingresso)
