  rag_context: |
    PREZZI TAVOLI (fissi):
      VIP Face standard (F6-F21): minimo 300 per 8 persone, 35 per persona extra
      VIP Balcony (B1-B5): minimo 300 per 8 persone, 35 per persona extra
  rubric:
